name = "fortplot"
version = "2025.06.25"
license = "license"
author = "Christopher Albert"
maintainer = "albert@alumni.tugraz.at"
copyright = "Copyright 2025, Christopher Albert"

[build]
auto-executables = true
auto-tests = false
auto-examples = true
module-naming = false

[install]
library = true

[fortran]
implicit-typing = false
implicit-external = false
source-form = "free"

# Security: Enable trampoline detection and error on trampolines
# NOTE: To enable trampoline detection, compile manually with:
# fpm build --profile debug --flag "-Wtrampolines -Werror=trampolines"

[extra.ford]
project = "fortplot"
summary = "Modern Fortran plotting library with multiple backends"
src_dir = ["src", "example"]
output_dir = "build/doc"
page_dir = "doc"
exclude = "**/fortplot_pdf_text.f90"

# Tests are auto-discovered from test/ directory
# Single explicit entry to compile all test files together (including module-only files)
[[test]]
name = "fortplot_tests"
source-dir = "test"
main = "test_all_modules.f90"

# Explicit source-file lists for subdirectory tests
[[test]]
name = "test_3d"
source = ["test/3d/test_3d.f90", "test/3d/test_is_3d_empty_allocation.f90", "test/test_pdf_utils.f90", "test/test_output_helpers.f90"]
main = "test/3d/test_3d.f90"

