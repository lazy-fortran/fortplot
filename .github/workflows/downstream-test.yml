name: Downstream Integration Test

on:
  push:
    branches: ["main"]
  pull_request_target:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Require maintainer approval for PRs from forked repositories
  require_approval_for_forks:
    name: Approval gate (forks)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.fork == true
    steps:
      - name: Wait for maintainer approval
        run: |
          echo "This PR is from a forked repository."
          echo "A maintainer must approve this workflow run before CI proceeds."
          echo "Click 'Review deployments' -> 'Approve' on this job to continue."
          echo "If you are a maintainer, approve this run. Otherwise, close the PR."
          sleep 999999

  cmake-fetchcontent:
    needs: require_approval_for_forks
    name: CMake FetchContent
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ github.event.pull_request.head.sha || github.ref }}

    - name: Cache and install apt packages
      uses: awalsh128/cache-apt-pkgs-action@v1.5.3
      with:
        packages: gfortran cmake ninja-build
        version: 1

    - name: Test CMake FetchContent integration
      run: |
        cd example/user_compilation_examples/cmake_project_template
        cmake -S . -B build -G Ninja \
          -DFORTPLOT_FETCH_SOURCE_DIR="${GITHUB_WORKSPACE}"
        cmake --build build
        ./build/bin/fortplot_demo

    - name: Verify CMake demo outputs
      run: |
        cd example/user_compilation_examples/cmake_project_template
        ls -la cmake_*.png cmake_*.pdf cmake_*.txt

  fpm-dependency:
    name: FPM Dependency
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v5
      with:
        ref: ${{ github.event.pull_request.head.sha || github.ref }}

    - name: Cache and install apt packages
      uses: awalsh128/cache-apt-pkgs-action@v1.5.3
      with:
        packages: gfortran
        version: 1

    - name: Install FPM
      run: |
        cd /tmp
        wget --timeout=30 https://github.com/fortran-lang/fpm/releases/download/v0.12.0/fpm-0.12.0-linux-x86_64-gcc-12 \
          && chmod +x fpm-0.12.0-linux-x86_64-gcc-12 \
          && sudo mv fpm-0.12.0-linux-x86_64-gcc-12 /usr/local/bin/fpm \
          && fpm --version || exit 1

    - name: Test FPM dependency integration
      run: |
        cd example/user_compilation_examples/fpm_project_template
        fpm build
        fpm run fpm_template_demo

    - name: Verify FPM demo outputs
      run: |
        cd example/user_compilation_examples/fpm_project_template
        ls -la fpm_*.png fpm_*.pdf fpm_*.txt
